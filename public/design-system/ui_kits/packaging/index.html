<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mang Guabao · Packaging UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { background: #F1ECDD; margin: 0; }
  * { box-sizing: border-box; }
  .canvas { padding: 40px 40px 60px; max-width: 1320px; margin: 0 auto; }
  .head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 32px; }
  .head h1 { font-family: var(--font-subhead); color: var(--saging-green); font-size: 44px; margin: 0; white-space: nowrap; }
  .eyebrow { font-family: var(--font-body); font-weight: 900; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--leaf-green); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; }
  .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .label { font-family: var(--font-body); font-weight: 900; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--saging-green); opacity: 0.65; margin-top: 14px; text-align: center; }
  .frame { display: inline-flex; flex-direction: column; align-items: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="BaoWrapper.jsx"></script>
<script type="text/babel" src="DrinkCup.jsx"></script>
<script type="text/babel" src="TrayLiner.jsx"></script>
<script type="text/babel" src="TakeoutBag.jsx"></script>
<script type="text/babel" src="ReceiptCard.jsx"></script>
<script type="text/babel" src="NeonStorefront.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <div className="canvas">
      <div className="head">
        <div>
          <div className="eyebrow">05 — Packaging</div>
          <h1>What You Hold</h1>
        </div>
        <div style={{ fontFamily: "var(--font-script)", color: "var(--lechon-brown)", fontSize: 28, fontWeight: 600 }}>
          "Hawak mo na 'to."
        </div>
      </div>

      <div className="row" style={{ marginBottom: 40 }}>
        <div className="frame"><NeonStorefront /><div className="label">Storefront Neon</div></div>
      </div>

      <div className="grid">
        <div className="frame"><BaoWrapper /><div className="label">Bao Wrapper · 1-color print</div></div>
        <div className="frame"><DrinkCup /><div className="label">Drink Cup · Calamansi Lemonade</div></div>
        <div className="frame"><TrayLiner /><div className="label">Tray Liner · Bao White stripe</div></div>
        <div className="frame"><TakeoutBag /><div className="label">Takeout Bag · Kraft stamp</div></div>
      </div>

      <div className="row" style={{ marginTop: 40 }}>
        <div className="frame"><ReceiptCard /><div className="label">Receipt · Thank-you quote</div></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
