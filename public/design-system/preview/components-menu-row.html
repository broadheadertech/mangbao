<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Menu Row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px; background: var(--saging-green); font-family: var(--font-body); }
  .menu { background: var(--saging-green); border-radius: 18px; padding: 14px 18px; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px dashed rgba(255,253,247,0.12); align-items: start; }
  .row:last-child { border-bottom: 0; }
  .name { font-family: var(--font-subhead); font-size: 20px; color: var(--saffron-yellow); display: flex; gap: 10px; align-items: center; }
  .desc { color: rgba(255,253,247,0.72); font-size: 13px; font-weight: 700; margin-top: 3px; line-height: 1.4; }
  .price { font-family: var(--font-display); color: var(--saffron-yellow); font-size: 26px; line-height: 1; }
  .peso { font-size: 16px; vertical-align: 4px; margin-right: 1px; }
  .bs { background: var(--sili-red); color: var(--bao-white); font-weight: 900; font-size: 9px; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 999px; text-transform: uppercase; }
  .sp { background: var(--leaf-green); color: var(--bao-white); font-weight: 900; font-size: 9px; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 999px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="menu">
    <div class="row">
      <div>
        <div class="name">Sisig Bao <span class="bs">Bestseller</span></div>
        <div class="desc">Sizzling sisig, chicharon bits, egg aioli, pickled papaya slaw.</div>
      </div>
      <div class="price"><span class="peso">₱</span>119</div>
    </div>
    <div class="row">
      <div>
        <div class="name">Bicol Express Bao <span class="sp">🌶️ Spicy</span></div>
        <div class="desc">Coconut pork, green chili, crispy shallots.</div>
      </div>
      <div class="price"><span class="peso">₱</span>109</div>
    </div>
  </div>
</body>
</html>
