<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Neon Wall</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: #0A0A0A; font-family: var(--font-body); }
  .sign {
    background: #111; border-radius: 22px; padding: 28px 24px; text-align: center;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
  }
  .neon {
    font-family: var(--font-script); font-weight: 700; font-size: 56px; line-height: 1; color: #F4B942;
    text-shadow: 0 0 6px rgba(244,185,66,0.9), 0 0 18px rgba(244,185,66,0.6), 0 0 40px rgba(244,185,66,0.45);
  }
  .star { color: #F4B942; font-size: 36px; vertical-align: 12px; margin-left: 8px;
    text-shadow: 0 0 8px rgba(244,185,66,0.9); }
  .sub {
    margin-top: 14px; font-family: var(--font-body); font-weight: 900; font-size: 12px; letter-spacing: 0.24em;
    color: #52B788; text-shadow: 0 0 6px rgba(82,183,136,0.7), 0 0 18px rgba(82,183,136,0.5);
  }
</style>
</head>
<body>
  <div class="sign">
    <div class="neon">Hawak ang Sarap<span class="star">✦</span></div>
    <div class="sub">MANG GUABAO · FILIPINO FUSION BAO</div>
  </div>
</body>
</html>
