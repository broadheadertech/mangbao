<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Color Pairings</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bao-white); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .p {
    border-radius: 16px; padding: 18px 16px; min-height: 120px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-subhead); font-size: 22px; line-height: 1.05;
  }
  .p small { font-family: var(--font-body); font-weight: 800; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="p" style="background:#1B4332;color:#F4B942;text-shadow:3px 3px 0 #6B3A2A">Hero<small style="color:#FFFDF7">Saging · Saffron</small></div>
    <div class="p" style="background:#FFFDF7;color:#1B4332">Body<small>Bao White · Saging</small></div>
    <div class="p" style="background:#F4B942;color:#1B4332">Promo<small>Saffron · Saging</small></div>
    <div class="p" style="background:#6B3A2A;color:#FFFDF7">Quote<small style="color:#F4B942">Brown · Bao White</small></div>
  </div>
</body>
</html>
