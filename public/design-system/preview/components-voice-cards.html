<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Voice Cards</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px; background: #0F2A20; font-family: var(--font-body); display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  .v { border-radius: 18px; padding: 16px 18px; position: relative; overflow: hidden; min-height: 130px; }
  .n { position: absolute; right: 14px; top: 6px; font-family: var(--font-display); font-size: 56px; opacity: 0.16; line-height: 1; }
  .t { font-family: var(--font-subhead); font-size: 22px; line-height: 1.05; }
  .d { font-size: 12px; font-weight: 700; line-height: 1.4; margin-top: 6px; }
  .q { font-family: var(--font-script); font-size: 16px; margin-top: 10px; border-top: 1px solid currentColor; padding-top: 8px; opacity: 0.9; }
  .green { background: #1B4332; color: #FFFDF7; }
  .green .t { color: #FFFDF7; }
  .yellow { background: #F4B942; color: #1B4332; }
  .brown { background: #6B3A2A; color: #FFFDF7; }
  .leaf { background: #52B788; color: #1B4332; }
</style>
</head>
<body>
  <div class="v green"><div class="n">01</div><div class="t">Makulit</div><div class="d">Playful, cheeky, never annoying.</div><div class="q">"Bakit ka pa pumunta ng ibang lugar?"</div></div>
  <div class="v yellow"><div class="n">02</div><div class="t">Proud</div><div class="d">Unapologetically Filipino. Owns its roots.</div><div class="q">"Filipino to the bone."</div></div>
  <div class="v brown"><div class="n">03</div><div class="t">Generous</div><div class="d">Always makes you feel welcome and fed.</div><div class="q">"Sulit na sulit ka dito."</div></div>
  <div class="v leaf"><div class="n">04</div><div class="t">Aspirational</div><div class="d">Street food that made it.</div><div class="q">"World-class lasa."</div></div>
</body>
</html>
