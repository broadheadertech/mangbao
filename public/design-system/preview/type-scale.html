<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bao-white); font-family: var(--font-body); color: var(--saging-green); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px dashed rgba(27,67,50,0.15); font-size: 12px; }
  th { font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--leaf-green); font-size: 10px; }
  .s { font-family: var(--font-subhead); color: var(--lechon-brown); }
  .b { font-family: var(--font-display); }
</style>
</head>
<body>
  <table>
    <tr><th>Token</th><th>Size</th><th>Family</th><th>Sample</th></tr>
    <tr><td>display-xl</td><td>80</td><td>Bebas</td><td class="b" style="font-size:28px;color:var(--saffron-yellow);text-shadow:2px 2px 0 var(--lechon-brown)">MANG GUABAO</td></tr>
    <tr><td>display-m</td><td>40</td><td>Lilita</td><td class="s" style="font-size:20px">The Menu Feel</td></tr>
    <tr><td>title</td><td>20</td><td>Lilita</td><td class="s" style="font-size:16px">Sisig Bao</td></tr>
    <tr><td>body</td><td>16</td><td>Nunito 700</td><td style="font-weight:700">Sizzling sisig, chicharon bits</td></tr>
    <tr><td>eyebrow</td><td>13</td><td>Nunito 900</td><td style="font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:var(--leaf-green)">01 — Brand Colors</td></tr>
    <tr><td>pill</td><td>12</td><td>Nunito 900</td><td><span style="background:#C1121F;color:#FFFDF7;padding:3px 8px;border-radius:999px;font-weight:900;letter-spacing:0.08em;font-size:10px">BESTSELLER</span></td></tr>
  </table>
</body>
</html>
