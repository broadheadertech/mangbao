<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Brand Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bao-white); }
  .card { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .sw { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-card); background: white; }
  .sw .chip { height: 110px; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .name { font-family: var(--font-subhead); color: var(--saging-green); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; }
  .sw .hex { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; color: var(--fg-on-light-muted); margin-top: 2px; }
  .sw .role { font-family: var(--font-body); font-weight: 700; font-size: 10px; color: var(--fg-on-light-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="sw"><div class="chip" style="background:#1B4332"></div><div class="meta"><div class="name">Saging Green</div><div class="hex">#1B4332</div><div class="role">Primary · brand anchor</div></div></div>
    <div class="sw"><div class="chip" style="background:#F4B942"></div><div class="meta"><div class="name">Saffron Yellow</div><div class="hex">#F4B942</div><div class="role">Accent · energy &amp; warmth</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFDF7;border:1px solid var(--border-hairline-light)"></div><div class="meta"><div class="name">Bao White</div><div class="hex">#FFFDF7</div><div class="role">Background · clean &amp; soft</div></div></div>
  </div>
</body>
</html>
