<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--saging-green); }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .specimen {
    font-family: var(--font-display); font-size: 88px; line-height: 0.9;
    color: var(--saffron-yellow); text-shadow: 5px 5px 0 var(--lechon-brown);
    text-transform: uppercase; letter-spacing: 0.02em;
  }
  .label { font-family: var(--font-body); font-weight: 900; font-size: 11px; letter-spacing: 0.18em; color: var(--leaf-green); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="stack">
    <div class="label">Display · Bebas Neue · 80–96 / 0.95 / brown shadow</div>
    <div class="specimen">Hawak ang Sarap</div>
  </div>
</body>
</html>
