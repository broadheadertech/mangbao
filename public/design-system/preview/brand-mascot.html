<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Mascot — Mang G</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px 24px; background: var(--bao-white); font-family: var(--font-body); display: flex; align-items: center; gap: 22px; }
  img { width: 140px; height: 140px; }
  .info { display: flex; flex-direction: column; gap: 6px; }
  .name { font-family: var(--font-subhead); color: var(--saging-green); font-size: 26px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { background: var(--saging-green); color: var(--bao-white); border-radius: 999px; padding: 6px 12px; font-weight: 800; font-size: 11px; }
  .desc { color: var(--fg-on-light); font-weight: 700; font-size: 13px; line-height: 1.4; max-width: 340px; }
</style>
</head>
<body>
  <img src="../assets/mascot-mang-g.svg" alt="Mang G mascot"/>
  <div class="info">
    <div class="name">Mang G</div>
    <div class="desc">Bao body. Salakot hat. Mustache. Chopsticks. The product, the lolo, and the brand — in one face.</div>
    <div class="row">
      <span class="chip">Bao Body</span>
      <span class="chip">Salakot</span>
      <span class="chip">Mustache</span>
      <span class="chip">Chopsticks</span>
    </div>
  </div>
</body>
</html>
