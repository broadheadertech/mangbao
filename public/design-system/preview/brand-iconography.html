<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bao-white); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
  .cell { background: white; border-radius: 14px; padding: 12px 6px; box-shadow: 0 1px 3px rgba(27,67,50,0.06); }
  .em { font-size: 28px; line-height: 1; }
  .lbl { margin-top: 6px; font-weight: 800; font-size: 10px; color: var(--saging-green); letter-spacing: 0.04em; }
  .note { margin-top: 12px; font-weight: 700; font-size: 11px; color: var(--fg-on-light-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="em">🥟</div><div class="lbl">Bao</div></div>
    <div class="cell"><div class="em">🌶️</div><div class="lbl">Spicy</div></div>
    <div class="cell"><div class="em">🧋</div><div class="lbl">Drink</div></div>
    <div class="cell"><div class="em">🥢</div><div class="lbl">Fusion</div></div>
    <div class="cell"><div class="em">🎉</div><div class="lbl">Promo</div></div>
    <div class="cell"><div class="em">✨</div><div class="lbl">Sparkle</div></div>
    <div class="cell"><div class="em">🇵🇭</div><div class="lbl">PH</div></div>
  </div>
  <div class="note">Apple-style color emoji only. No line icons in brand surfaces. Lucide allowed for UI plumbing.</div>
</body>
</html>
