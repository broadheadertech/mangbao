<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bao-white); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .col { display: flex; flex-direction: column; align-items: center; }
  .bar { background: var(--saging-green); border-radius: 4px; width: 32px; }
  .lbl { font-weight: 900; color: var(--saging-green); font-size: 10px; letter-spacing: 0.08em; margin-top: 6px; text-transform: uppercase; }
  .px { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg-on-light-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">5</div><div class="px">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">6</div><div class="px">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">7</div><div class="px">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">8</div><div class="px">64</div></div>
  </div>
</body>
</html>
