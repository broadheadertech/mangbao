<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Brand Colors — Supporting</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--bao-white); }
  .card { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .sw { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-card); background: white; }
  .sw .chip { height: 110px; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .name { font-family: var(--font-subhead); color: var(--saging-green); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; }
  .sw .hex { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; color: var(--fg-on-light-muted); margin-top: 2px; }
  .sw .role { font-family: var(--font-body); font-weight: 700; font-size: 10px; color: var(--fg-on-light-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="sw"><div class="chip" style="background:#52B788"></div><div class="meta"><div class="name">Leaf Green</div><div class="hex">#52B788</div><div class="role">Secondary · fresh contrast</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B3A2A"></div><div class="meta"><div class="name">Lechon Brown</div><div class="hex">#6B3A2A</div><div class="role">Shadow &amp; depth</div></div></div>
    <div class="sw"><div class="chip" style="background:#C1121F"></div><div class="meta"><div class="name">Sili Red</div><div class="hex">#C1121F</div><div class="role">Alert · spicy &amp; promo</div></div></div>
  </div>
</body>
</html>
