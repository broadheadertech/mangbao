<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--saging-green); font-family: var(--font-body); display: flex; align-items: center; gap: 24px;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 24px);
  }
  .mark { width: 130px; height: 130px; flex-shrink: 0; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .line { font-family: var(--font-display); font-size: 56px; line-height: 0.95; letter-spacing: 0.01em; color: var(--saffron-yellow); text-shadow: 4px 4px 0 var(--lechon-brown); }
  .line.white { color: var(--bao-white); }
  .tag { font-family: var(--font-script); font-weight: 600; color: var(--leaf-green); font-size: 22px; margin-top: 4px; }
</style>
</head>
<body>
  <img class="mark" src="../assets/mascot-mang-g.svg" alt=""/>
  <div class="stack">
    <div class="line">MANG</div>
    <div class="line white">GUABAO</div>
    <div class="tag">Hawak ang Sarap</div>
  </div>
</body>
</html>
