<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 26px 24px 36px; background: var(--bao-white); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .c { background: white; border-radius: 16px; padding: 16px; min-height: 70px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--font-subhead); color: var(--saging-green); font-size: 13px; }
  .v { font-family: ui-monospace, monospace; font-size: 9px; color: var(--fg-on-light-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="c" style="box-shadow:none;border:1px solid rgba(27,67,50,0.10)">
      <div class="name">Flat</div><div class="v">— · hairline only</div>
    </div>
    <div class="c" style="box-shadow:0 1px 2px rgba(27,67,50,0.20)">
      <div class="name">Press</div><div class="v">0 1 2 / .20</div>
    </div>
    <div class="c" style="box-shadow:0 4px 16px rgba(27,67,50,0.10)">
      <div class="name">Card</div><div class="v">0 4 16 / .10</div>
    </div>
    <div class="c" style="box-shadow:0 8px 24px rgba(27,67,50,0.12)">
      <div class="name">Soft / Hover</div><div class="v">0 8 24 / .12</div>
    </div>
  </div>
</body>
</html>
