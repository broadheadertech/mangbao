<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Pills &amp; Badges</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 26px; background: var(--bao-white); font-family: var(--font-body); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .p { display: inline-flex; align-items: center; gap: 4px; padding: 8px 14px; border-radius: 999px; font-weight: 900; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .b { background: var(--sili-red); color: var(--bao-white); }
  .s { background: var(--leaf-green); color: var(--bao-white); }
  .o { background: transparent; color: var(--saffron-yellow); border: 2px solid var(--saffron-yellow); }
  .n { background: var(--saffron-yellow); color: var(--saging-green); }
  .est { background: transparent; color: var(--saffron-yellow); border: 2px solid var(--saffron-yellow); padding: 10px 18px; font-size: 13px; }
  .dark { background: var(--saging-green); padding: 12px 18px; border-radius: 14px; }
</style>
</head>
<body>
  <span class="p b">Bestseller</span>
  <span class="p s">🌶️ Spicy</span>
  <span class="p n">New</span>
  <div class="dark"><span class="p est">Est. 2025 · Manila</span></div>
</body>
</html>
