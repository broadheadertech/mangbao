<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mang Guabao · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bao-white); font-family: var(--font-body); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .b { width: 80px; height: 60px; background: var(--saging-green); display: flex; align-items: flex-end; justify-content: center; color: var(--saffron-yellow); font-weight: 900; font-size: 10px; padding-bottom: 6px; letter-spacing: 0.1em; }
  .l { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: var(--saging-green); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="b" style="border-radius:10px">10</div><div class="l">input</div></div>
    <div><div class="b" style="border-radius:12px">12</div><div class="l">inner</div></div>
    <div><div class="b" style="border-radius:14px">14</div><div class="l">button</div></div>
    <div><div class="b" style="border-radius:20px">20</div><div class="l">card</div></div>
    <div><div class="b" style="border-radius:999px;width:120px">999</div><div class="l">pill</div></div>
  </div>
</body>
</html>
